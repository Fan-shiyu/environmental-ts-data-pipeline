name: Annual NDVI update (Pass B)

on:
  schedule:
    - cron: '13 8 5 4 *'   # 08:13 UTC on April 5th — after burned area Dec data is published
  workflow_dispatch:         # allow manual trigger

concurrency:
  group: monthly-ndvi-update   # same group as monthly — prevents overlap
  cancel-in-progress: false

jobs:
  annual-update:
    runs-on: ubuntu-latest
    timeout-minutes: 180     # Pass B takes longer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run annual update (with forced Pass B)
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: |
          python -u scripts/monthly_update.py --skip-deploy --force-pass-b

      - name: Upload outputs as artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ndvi-annual-update-${{ github.run_number }}
          path: |
            outputs/update_log.csv
            outputs/processed/Zambia_Mponda/sentinel2/100m/ndvi_annual.parquet
            outputs/processed/Zambia_Mponda/modis/1000m/ndvi_annual_by_class.parquet
            outputs/processed/Zambia_WL/burned_area/500m/fire_return_period.geojson
          retention-days: 90
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Annual NDVI update failed - Run #${context.runNumber}`,
              body: `The annual Pass B update workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure']
            })
