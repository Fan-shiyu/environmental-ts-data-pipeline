name: Manual backfill (test / recovery)

# Manual-only workflow to fetch a bounded date range via scripts/backfill_full.py
# (which supports --stage, --dry-run, --start-date, --end-date).

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to backfill'
        type: choice
        options: [sentinel2, modis, burned_area, all]
        default: sentinel2
      start_date:
        description: 'Start date (YYYY-MM, inclusive)'
        default: '2026-04'
      end_date:
        description: 'End date (YYYY-MM, inclusive)'
        default: '2026-05'
      dry_run:
        description: 'Dry run only'
        type: boolean
        default: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run backfill
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: |
          ARGS="--stage ${{ inputs.stage }}"
          ARGS="$ARGS --start-date ${{ inputs.start_date }}"
          ARGS="$ARGS --end-date ${{ inputs.end_date }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          export PYTHONPATH=$GITHUB_WORKSPACE
          python -u scripts/backfill_full.py $ARGS

      - name: Upload outputs as artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ github.run_number }}
          path: |
            outputs/Zambia_Mponda/sentinel2/100m/*.tif
            outputs/Zambia_WL/sentinel2/100m/*.tif
            outputs/backfill_log.csv
          retention-days: 7
          if-no-files-found: warn
