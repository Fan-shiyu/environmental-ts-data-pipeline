name: Monthly NDVI update

on:
  schedule:
    - cron: '13 6 5 * *'   # 06:13 UTC on the 5th of every month
  workflow_dispatch:         # allow manual trigger from GitHub UI
    inputs:
      skip_fetch:
        description: 'Skip GEE fetch (use existing rasters)'
        type: boolean
        default: false
      force_pass_b:
        description: 'Force Pass B recompute'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no fetch, no deploy)'
        type: boolean
        default: false

concurrency:
  group: monthly-ndvi-update
  cancel-in-progress: false   # queue, don't cancel

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # 2-hour hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly update
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_fetch }}" = "true" ]; then
            ARGS="$ARGS --skip-fetch"
          fi
          if [ "${{ inputs.force_pass_b }}" = "true" ]; then
            ARGS="$ARGS --force-pass-b"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          # --skip-deploy: server SSH deploy added in Pass 6
          # -u: unbuffered output for real-time logs
          python -u scripts/monthly_update.py --skip-deploy $ARGS

      - name: Upload outputs as artifacts
        if: success() || failure()   # upload even if pipeline failed
        uses: actions/upload-artifact@v4
        with:
          name: ndvi-update-${{ github.run_number }}
          path: |
            outputs/update_log.csv
            outputs/processed/Zambia_Mponda/sentinel2/100m/ndvi_monthly.parquet
            outputs/processed/Zambia_Mponda/modis/1000m/ndvi_monthly.parquet
            outputs/processed/Zambia_WL/burned_area/500m/ba_monthly.parquet
          retention-days: 90
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Monthly NDVI update failed - Run #${context.runNumber}`,
              body: `The monthly update workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the logs and artifacts for details.`,
              labels: ['pipeline-failure']
            })
